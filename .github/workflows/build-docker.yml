name: Build Android APK with Docker

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v5

    - name: Build APK with Docker
      run: docker run --rm -v "${{ github.workspace }}":/home/user/project kivy/buildozer:latest python /home/user/project/build_apk.py

    - name: List files
      run: |
        ls -la bin/ 2>/dev/null || echo "No bin directory"
        find . -name "*.apk" 2>/dev/null || echo "No APK found"

    - name: Upload APK artifact
      uses: actions/upload-artifact@v4
      with:
        name: slideshow-player-apk
        path: |
          bin/*.apk
          *.apk
        retention-days: 30
