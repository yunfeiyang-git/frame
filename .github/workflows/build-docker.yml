name: Build Android APK with Docker

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v5

    - name: Build APK with Docker
      run: |
        docker run --rm -v "${{ github.workspace }}":/home/user/project kivy/buildozer:latest /bin/bash -c "
          # 直接修改 buildozer 源代码
          sed -i \"s|cont = input('Are you sure you want to continue \\[y/n\\]? ')||g\" /home/user/.venv/lib/python3.12/site-packages/buildozer/__init__.py
          sed -i \"s|if cont.lower() != 'y':|cont = 'y'\\n        if cont.lower() != 'y':|g\" /home/user/.venv/lib/python3.12/site-packages/buildozer/__init__.py
          
          # 运行 buildozer
          buildozer android debug
        "

    - name: List files
      run: |
        ls -la bin/ 2>/dev/null || echo "No bin directory"
        find . -name "*.apk" 2>/dev/null || echo "No APK found"

    - name: Upload APK artifact
      uses: actions/upload-artifact@v4
      with:
        name: slideshow-player-apk
        path: |
          bin/*.apk
          *.apk
        retention-days: 30
