name: Build Android APK

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v5

    - name: Set up Python 3.9
      uses: actions/setup-python@v6
      with:
        python-version: '3.9'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install buildozer cython
        sudo apt-get update
        sudo apt-get install -y git zip unzip openjdk-17-jdk python3-pip autoconf libtool pkg-config zlib1g-dev libncurses5-dev libncursesw5-dev cmake libffi-dev libssl-dev automake libtinfo6

    - name: Download and Setup Android SDK
      run: |
        cd /tmp
        wget -q https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip -O cmdline-tools.zip
        unzip -q cmdline-tools.zip

        mkdir -p /home/runner/.buildozer/android/platform/android-sdk/tools/bin
        mv cmdline-tools/bin/* /home/runner/.buildozer/android/platform/android-sdk/tools/bin/
        mv cmdline-tools/lib/* /home/runner/.buildozer/android/platform/android-sdk/tools/bin/ 2>/dev/null || true
        mv cmdline-tools/*.txt /home/runner/.buildozer/android/platform/android-sdk/tools/bin/ 2>/dev/null || true
        mv cmdline-tools/*.properties /home/runner/.buildozer/android/platform/android-sdk/tools/bin/ 2>/dev/null || true
        rm -rf cmdline-tools

        chmod +x /home/runner/.buildozer/android/platform/android-sdk/tools/bin/sdkmanager
        yes | /home/runner/.buildozer/android/platform/android-sdk/tools/bin/sdkmanager --licenses > /dev/null 2>&1 || true
        /home/runner/.buildozer/android/platform/android-sdk/tools/bin/sdkmanager "platform-tools" "platforms;android-34" "build-tools;34.0.0"

    - name: Build with Buildozer
      env:
        ANDROIDSDK: /home/runner/.buildozer/android/platform/android-sdk
        ANDROIDNDK: /home/runner/.buildozer/android/platform/android-ndk
        ANDROIDNDKVER: 25b
        ANDROIDAPI: 31
      run: |
        ls -la
        pwd
        buildozer -v android debug

    - name: Upload APK artifact
      uses: actions/upload-artifact@v4
      with:
        name: slideshow-player-apk
        path: bin/*.apk
        retention-days: 30
