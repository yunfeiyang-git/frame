name: Build Android APK

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v5

    - name: Set up Python 3.9
      uses: actions/setup-python@v6
      with:
        python-version: '3.9'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install buildozer cython
        sudo apt-get update
        sudo apt-get install -y git zip unzip openjdk-17-jdk python3-pip autoconf libtool pkg-config zlib1g-dev libncurses5-dev libncursesw5-dev cmake libffi-dev libssl-dev automake libtinfo6

    - name: Build with Buildozer
      env:
        ANDROIDSDK: /usr/local/lib/android/sdk
        ANDROIDNDK: /usr/local/lib/android/sdk/ndk-bundle
        ANDROIDNDKVER: 25b
        ANDROIDAPI: 31
      run: |
        ls -la /usr/local/lib/android/sdk/
        ls -la /usr/local/lib/android/sdk/build-tools/ 2>/dev/null || echo "No build-tools"
        buildozer -v android debug

    - name: Upload APK artifact
      uses: actions/upload-artifact@v4
      with:
        name: slideshow-player-apk
        path: bin/*.apk
        retention-days: 30
