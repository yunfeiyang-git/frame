name: Build Android APK

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v5

    - name: Set up Python 3.9
      uses: actions/setup-python@v6
      with:
        python-version: '3.9'

    - name: Setup Android SDK
      uses: android-actions/setup-android@v3

    - name: Install build-tools
      run: |
        if [ -d "$ANDROID_HOME/cmdline-tools/latest/bin" ]; then
          yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --install "build-tools;34.0.0" "platforms;android-34" "platform-tools" > /dev/null 2>&1 || true
        elif [ -d "$ANDROID_HOME/tools/bin" ]; then
          yes | $ANDROID_HOME/tools/bin/sdkmanager --install "build-tools;34.0.0" "platforms;android-34" "platform-tools" > /dev/null 2>&1 || true
        fi

    - name: Create symlink for Buildozer
      run: |
        mkdir -p /home/runner/.buildozer/android/platform
        if [ -d "$ANDROID_HOME" ] && [ ! -d "/home/runner/.buildozer/android/platform/android-sdk" ]; then
          ln -s "$ANDROID_HOME" /home/runner/.buildozer/android/platform/android-sdk
          echo "Created symlink from $ANDROID_HOME to /home/runner/.buildozer/android/platform/android-sdk"
        fi
        ls -la /home/runner/.buildozer/android/platform/
        ls -la /home/runner/.buildozer/android/platform/android-sdk/

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install buildozer cython
        sudo apt-get update
        sudo apt-get install -y git zip unzip openjdk-17-jdk python3-pip autoconf libtool pkg-config zlib1g-dev libncurses5-dev libncursesw5-dev cmake libffi-dev libssl-dev automake libtinfo6

    - name: Build with Buildozer
      env:
        ANDROIDSDK: $ANDROID_HOME
        ANDROIDNDK: /home/runner/.buildozer/android/platform/android-ndk
        ANDROIDNDKVER: 25b
        ANDROIDAPI: 31
      run: |
        ls -la
        pwd
        buildozer -v android debug

    - name: Upload APK artifact
      uses: actions/upload-artifact@v4
      with:
        name: slideshow-player-apk
        path: bin/*.apk
        retention-days: 30
