name: Build Android APK

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v5

    - name: Set up Python 3.9
      uses: actions/setup-python@v6
      with:
        python-version: '3.9'

    - name: Install system dependencies
      run: |
        python -m pip install --upgrade pip
        pip install buildozer cython
        sudo apt-get update
        sudo apt-get install -y git zip unzip openjdk-17-jdk python3-pip autoconf libtool pkg-config zlib1g-dev libncurses5-dev libncursesw5-dev cmake libffi-dev libssl-dev automake libtinfo6

    - name: Make prepare_sdk.sh executable
      run: |
        chmod +x prepare_sdk.sh

    - name: Prepare Android SDK for Buildozer
      run: |
        ./prepare_sdk.sh

    - name: Install Android SDK components
      run: |
        yes | /usr/local/lib/android/sdk/cmdline-tools/latest/bin/sdkmanager --sdk_root=/usr/local/lib/android/sdk "platforms;android-34" "build-tools;34.0.0" "platform-tools" 2>/dev/null || true
        ls -la /usr/local/lib/android/sdk/build-tools/
        ls -la /usr/local/lib/android/sdk/platforms/

    - name: Build with Buildozer
      run: |
        buildozer -v android debug 2>&1 | tee build.log || true

    - name: List all files
      run: |
        echo "=== Current directory ==="
        ls -la
        echo "=== Looking for APK files ==="
        find /home/runner/work -name "*.apk" 2>/dev/null || echo "No APK found"

    - name: Upload build log
      uses: actions/upload-artifact@v4
      with:
        name: build-log
        path: build.log
        retention-days: 7

    - name: Upload APK artifact
      uses: actions/upload-artifact@v4
      with:
        name: slideshow-player-apk
        path: |
          bin/*.apk
          /home/runner/work/**/*.apk
        retention-days: 30
